deployment:
  replicas: 1
  dnsPolicy: ClusterFirstWithHostNet

hostNetwork: true

# Cho phép non-root user bind port 80/443 (CAP_NET_BIND_SERVICE)
securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  runAsGroup: 0
  runAsNonRoot: false
  runAsUser: 0

nodeSelector:
  kubernetes.io/hostname: translation01

# Schema chart 40.0.0: chỉ cần override port; expose/protocol/exposedPort lấy default
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443
  # Đổi metrics sang 9101 để tránh conflict node-exporter (9100) khi hostNetwork
  metrics:
    port: 9101

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

# certResolvers via additionalArguments (schema-safe for Traefik chart v34+)
# TODO: sau khi có domain thật, thêm email vào đây và helm upgrade
additionalArguments:
  - "--certificatesresolvers.letsencrypt.acme.email=vonguyenhoanhhop9a42003@gmail.com"
  - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
  - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"

persistence:
  enabled: true
  size: 128Mi
  path: /data

metrics:
  prometheus:
    entryPoint: metrics
    service:
      enabled: true
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

logs:
  general:
    level: INFO
  access:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
