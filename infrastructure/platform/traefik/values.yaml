deployment:
  replicas: 1
  dnsPolicy: ClusterFirstWithHostNet

hostNetwork: true

nodeSelector:
  kubernetes.io/hostname: translation01

ports:
  web:
    port: 80
    hostPort: 80
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 443
    hostPort: 443
    exposedPort: 443
    protocol: TCP

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

# certResolvers via additionalArguments (schema-safe for Traefik chart v34+)
additionalArguments:
  - "--certificatesresolvers.letsencrypt.acme.email="  # TODO: set your email
  - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
  - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"

persistence:
  enabled: true
  size: 128Mi
  path: /data

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

logs:
  general:
    level: INFO
  access:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
