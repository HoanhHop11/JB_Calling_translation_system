apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jbcalling-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/HoanhHop11/JB_Calling_translation_system.git
    targetRevision: main
    path: infrastructure/helm/jbcalling
    helm:
      # Đang ở phase 6 (parallel staging trên k8s.jbcalling.site).
      # Khi cutover prod sang K8s, đổi sang values-prod.yaml.
      valueFiles:
        - values-staging-k8s.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jbcalling
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
