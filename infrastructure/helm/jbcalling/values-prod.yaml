global:
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent
  domain: jbcalling.site

gateway:
  image:
    tag: "2.0.6-vad-tuned"
  env:
    ANNOUNCED_IP: ""
    CORS_ORIGIN: "https://jbcalling.site,https://www.jbcalling.site,https://webrtc.jbcalling.site"
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    # Gateway phục vụ traffic WebRTC qua webrtc.jbcalling.site (chuẩn DNS hiện tại)
    host: webrtc.jbcalling.site
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt

coturn:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

frontend:
  replicaCount: 3
  env:
    REACT_APP_GATEWAY_URL: "https://webrtc.jbcalling.site"
    REACT_APP_SIGNALING_URL: "wss://webrtc.jbcalling.site"
    REACT_APP_TURN_SERVER: "turn:media.jbcalling.site:3478"
    REACT_APP_STT_SERVICE_URL: "https://stt.jbcalling.site"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  ingressRoute:
    enabled: true
    hosts:
      - jbcalling.site
      - www.jbcalling.site
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt

stt:
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2560Mi
  ingressRoute:
    enabled: true
    host: stt.jbcalling.site
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt

translation:
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    host: translation.jbcalling.site
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt

tts:
  nodeSelector:
    instance: translation02
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    host: tts.jbcalling.site
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt

redis:
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    size: 5Gi
    storageClass: local-path        # local-path-provisioner đã được cài

redis-gateway:
  resources:
    limits:
      cpu: 250m
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    size: 5Gi
    storageClass: local-path
