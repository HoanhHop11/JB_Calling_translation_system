global:
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent
  domain: jbcalling.site

# ============================================================================
# cert-manager Certificates: Let's Encrypt qua HTTP-01 challenge.
# Mỗi Certificate sẽ tạo 1 Secret cùng tên trong namespace jbcalling.
# IngressRoute bên dưới reference các Secret này qua tls.secretName.
# ============================================================================
certificates:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  list:
    - name: jbcalling-tls
      secretName: jbcalling-tls
      dnsNames:
        - jbcalling.site
        - www.jbcalling.site
    - name: webrtc-tls
      secretName: webrtc-tls
      dnsNames:
        - webrtc.jbcalling.site
    - name: stt-tls
      secretName: stt-tls
      dnsNames:
        - stt.jbcalling.site
    - name: translation-tls
      secretName: translation-tls
      dnsNames:
        - translation.jbcalling.site
    - name: tts-tls
      secretName: tts-tls
      dnsNames:
        - tts.jbcalling.site

gateway:
  image:
    tag: "2.0.6-vad-tuned"
  env:
    ANNOUNCED_IP: ""
    CORS_ORIGIN: "https://jbcalling.site,https://www.jbcalling.site,https://webrtc.jbcalling.site"
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    host: webrtc.jbcalling.site
    entryPoints:
      - websecure
    tls:
      secretName: webrtc-tls

coturn:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

frontend:
  replicaCount: 3
  env:
    REACT_APP_GATEWAY_URL: "https://webrtc.jbcalling.site"
    REACT_APP_SIGNALING_URL: "wss://webrtc.jbcalling.site"
    REACT_APP_TURN_SERVER: "turn:media.jbcalling.site:3478"
    REACT_APP_STT_SERVICE_URL: "https://stt.jbcalling.site"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  ingressRoute:
    enabled: true
    hosts:
      - jbcalling.site
      - www.jbcalling.site
    entryPoints:
      - websecure
    tls:
      secretName: jbcalling-tls

stt:
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2560Mi
  ingressRoute:
    enabled: true
    host: stt.jbcalling.site
    entryPoints:
      - websecure
    tls:
      secretName: stt-tls

translation:
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    host: translation.jbcalling.site
    entryPoints:
      - websecure
    tls:
      secretName: translation-tls

tts:
  nodeSelector:
    instance: translation02
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 750m
      memory: 1Gi
  ingressRoute:
    enabled: true
    host: tts.jbcalling.site
    entryPoints:
      - websecure
    tls:
      secretName: tts-tls

redis:
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    size: 5Gi
    storageClass: local-path

redis-gateway:
  resources:
    limits:
      cpu: 250m
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    size: 5Gi
    storageClass: local-path
