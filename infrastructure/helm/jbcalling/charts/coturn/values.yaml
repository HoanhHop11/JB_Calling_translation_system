replicaCount: 1

image:
  registry: ghcr.io
  repository: jackboun11/jbcalling-coturn
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

service:
  type: ClusterIP
  ports:
    - name: turn-tcp
      port: 3478
      protocol: TCP
    - name: turn-udp
      port: 3478
      protocol: UDP
    - name: turn-tls
      port: 5349
      protocol: TCP

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector:
  instance: translation02

tolerations: []
affinity: {}

config:
  realm: "jbcalling.site"
  listeningPort: 3478
  tlsListeningPort: 5349
  minPort: 49152
  maxPort: 49156
  externalIp: ""
  authSecret: ""

turnserverConf: |
  listening-port=3478
  tls-listening-port=5349
  min-port=49152
  max-port=49156
  fingerprint
  lt-cred-mech
  realm=jbcalling.site
  log-file=stdout
  no-multicast-peers
  no-cli
  no-tlsv1
  no-tlsv1_1
