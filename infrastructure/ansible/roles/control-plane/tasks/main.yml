---
- name: Check if cluster is already initialised
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_already_init

# ── kubeadm init ────────────────────────────────────────────────────
- name: Render kubeadm config
  ansible.builtin.template:
    src: kubeadm-config.yml.j2
    dest: /tmp/kubeadm-config.yml
    mode: "0644"
  when: not kubeadm_already_init.stat.exists

- name: Initialise the Kubernetes control-plane
  ansible.builtin.command: >-
    kubeadm init
    --config /tmp/kubeadm-config.yml
    --upload-certs
  register: kubeadm_init
  when: not kubeadm_already_init.stat.exists
  changed_when: kubeadm_init.rc == 0

- name: Wait for API server to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    delay: 5
    timeout: 120

# ── kubeconfig for the deploy user ──────────────────────────────────
- name: Create .kube directory for {{ ansible_user }}
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy admin.conf to user kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

# ── Taint & label ──────────────────────────────────────────────────
- name: Remove NoSchedule taint from control-plane node
  ansible.builtin.command: >-
    kubectl taint nodes {{ ansible_hostname }}
    node-role.kubernetes.io/control-plane:NoSchedule-
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  register: taint_result
  changed_when: "'untainted' in taint_result.stdout"
  failed_when:
    - taint_result.rc != 0
    - "'not found' not in taint_result.stderr"

- name: Label control-plane node with instance name
  ansible.builtin.command: >-
    kubectl label nodes {{ ansible_hostname }}
    instance={{ instance_label }} --overwrite
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  changed_when: true

# ── Generate join command for workers ───────────────────────────────
- name: Create bootstrap join token
  ansible.builtin.command: >-
    kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Store join command as fact
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ join_command_raw.stdout }}"

- name: Share join command with worker hosts
  ansible.builtin.add_host:
    name: "{{ item }}"
    kubeadm_join_command: "{{ kubeadm_join_command }}"
  loop: "{{ groups['workers'] }}"
  changed_when: false
