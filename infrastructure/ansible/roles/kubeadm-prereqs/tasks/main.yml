---
# ── Swap ────────────────────────────────────────────────────────────
- name: Disable swap (runtime)
  ansible.builtin.command: swapoff -a
  changed_when: true

- name: Remove swap entries from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent

# ── Kernel modules ──────────────────────────────────────────────────
- name: Load required kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

# ── Sysctl ──────────────────────────────────────────────────────────
- name: Set sysctl parameters for Kubernetes networking
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: true
    state: present
  loop:
    - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward, value: "1" }

# ── Kubernetes pre-requisite system packages ────────────────────────
- name: Install required system packages (conntrack, socat, ebtables, etc.)
  ansible.builtin.apt:
    name:
      - conntrack        # required by kubeadm preflight
      - socat            # required by kubeadm preflight
      - ebtables         # required by kubeadm preflight
      - ipset
      - ipvsadm
    state: present
    update_cache: true

# ── Containerd ──────────────────────────────────────────────────────
- name: Install containerd dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: false

- name: Add Docker GPG key (containerd source)
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository (containerd source)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64] https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable SystemdCgroup in containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup\s*='
    line: "            SystemdCgroup = true"
    insertafter: '.*\[plugins.*containerd\.runtimes\.runc\.options\]'
  notify: Restart containerd

# Flush handlers ngay để containerd restart trước khi kubeadm init chạy
- name: Flush handlers to restart containerd immediately
  ansible.builtin.meta: flush_handlers

- name: Ensure containerd is enabled and running
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for containerd socket to be ready
  ansible.builtin.wait_for:
    path: /var/run/containerd/containerd.sock
    timeout: 30

# ── Kubernetes packages ─────────────────────────────────────────────
- name: Add Kubernetes GPG key
  ansible.builtin.apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/Release.key"
    state: present

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/ /"
    filename: kubernetes
    state: present

- name: Install kubeadm, kubelet, and kubectl
  ansible.builtin.apt:
    name:
      - "kubeadm={{ kube_apt_version }}"
      - "kubelet={{ kube_apt_version }}"
      - "kubectl={{ kube_apt_version }}"
    state: present
    update_cache: true
    allow_change_held_packages: true

- name: Hold Kubernetes packages at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

- name: Ensure kubelet is enabled
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
