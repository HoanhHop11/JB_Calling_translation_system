---
all:
  vars:
    ansible_user: ubuntu
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

    # Kubernetes cluster settings
    kube_version: "1.31"
    kube_apt_version: "1.31.*"
    pod_network_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    # Calico manifest version – update when upgrading CNI
    calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml"

  children:
    control_plane:
      hosts:
        translation01:
          ansible_host: 34.142.153.246      # GCE external IP – control-plane + worker
          instance_label: translation01

    workers:
      hosts:
        translation02:
          ansible_host: 34.142.244.250      # GCE external IP – worker
          instance_label: translation02
        translation03:
          ansible_host: 35.186.151.227      # GCE external IP – worker
          instance_label: translation03

    kube_cluster:
      children:
        control_plane:
        workers:
