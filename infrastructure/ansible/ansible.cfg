[defaults]
inventory = inventory/prod/hosts.yml
remote_user = ubuntu
host_key_checking = False
timeout = 30
forks = 5
retry_files_enabled = False
roles_path = roles

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
