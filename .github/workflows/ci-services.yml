name: CI – Services

on:
  push:
    branches: [main]
    paths: ["services/**"]
  pull_request:
    paths: ["services/**"]

permissions:
  contents: write
  pull-requests: write

env:
  REGISTRY: docker.io
  REGISTRY_NAMESPACE: jackboun11

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
      changes_json: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            coturn:
              - 'services/coturn/**'
            frontend:
              - 'services/frontend/**'
            gateway:
              - 'services/gateway/**'
            mediasoup:
              - 'services/mediasoup/**'
            signaling-hybrid:
              - 'services/signaling-hybrid/**'
            stt:
              - 'services/stt/**'
            stt-sherpa:
              - 'services/stt-sherpa/**'
            translation:
              - 'services/translation/**'
            translation-vinai:
              - 'services/translation-vinai/**'
            tts:
              - 'services/tts/**'
            tts-piper:
              - 'services/tts-piper/**'

      - id: set-matrix
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          if [ "$CHANGED" == "[]" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            MATRIX=$(echo "$CHANGED" | jq -c '{service: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Short commit SHA (khớp tag docker/metadata-action type=sha,format=short)
        id: commit
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/jbcalling-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (informational)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/jbcalling-${{ matrix.service }}:sha-${{ steps.commit.outputs.short }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  bump-helm-tag:
    name: Auto-PR bump image tag
    needs: [detect-changes, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Bump image tags in values-prod.yaml
        id: bump
        env:
          CHANGED: ${{ needs.detect-changes.outputs.changes_json }}
          NEW_TAG: sha-${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail

          # Mapping service-folder -> helm release key (subchart trong umbrella).
          # Chỉ bump cho services thực sự có trong Helm chart.
          declare -A MAP=(
            [frontend]=frontend
            [gateway]=gateway
            [coturn]=coturn
            [stt]=stt
            [translation]=translation
            [tts]=tts
          )

          FILE=infrastructure/helm/jbcalling/values-prod.yaml
          SERVICES=$(echo "$CHANGED" | jq -r '.[]')
          BUMPED=()

          for svc in $SERVICES; do
            key="${MAP[$svc]:-}"
            if [ -z "$key" ]; then
              echo "Skip $svc (không có mapping Helm)"
              continue
            fi
            echo "→ Bump ${key}.image.tag = ${NEW_TAG}"
            yq eval ".${key}.image.tag = \"${NEW_TAG}\"" -i "$FILE"
            BUMPED+=("$svc")
          done

          if [ ${#BUMPED[@]} -eq 0 ]; then
            echo "bumped=" >> "$GITHUB_OUTPUT"
            echo "Không có service nào cần bump tag."
          else
            JOINED=$(IFS=, ; echo "${BUMPED[*]}")
            echo "bumped=$JOINED" >> "$GITHUB_OUTPUT"
          fi

          git diff "$FILE" || true

      - name: Create Pull Request
        if: steps.bump.outputs.bumped != ''
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/bump-images-${{ steps.sha.outputs.short }}
          delete-branch: true
          base: main
          commit-message: "chore: bump ${{ steps.bump.outputs.bumped }} image tag to sha-${{ steps.sha.outputs.short }}"
          title: "chore: bump ${{ steps.bump.outputs.bumped }} → sha-${{ steps.sha.outputs.short }}"
          body: |
            **Auto-generated** từ CI pipeline `ci-services.yml`.

            - Commit nguồn: ${{ github.sha }}
            - Services bump tag: `${{ steps.bump.outputs.bumped }}`
            - Tag mới: `sha-${{ steps.sha.outputs.short }}`

            Sau khi merge PR này:
            1. Argo CD sẽ phát hiện diff trong `values-prod.yaml`.
            2. Sync thủ công `jbcalling-prod` qua Argo CD UI / CLI:
               ```bash
               argocd app sync jbcalling-prod
               ```
          labels: |
            automated
            bump-tag
