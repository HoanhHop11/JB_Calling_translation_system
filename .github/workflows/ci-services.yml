name: CI – Services

on:
  push:
    branches: [main]
    paths: ["services/**"]
  pull_request:
    paths: ["services/**"]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            coturn:
              - 'services/coturn/**'
            frontend:
              - 'services/frontend/**'
            gateway:
              - 'services/gateway/**'
            mediasoup:
              - 'services/mediasoup/**'
            signaling-hybrid:
              - 'services/signaling-hybrid/**'
            stt:
              - 'services/stt/**'
            stt-sherpa:
              - 'services/stt-sherpa/**'
            translation:
              - 'services/translation/**'
            translation-vinai:
              - 'services/translation-vinai/**'
            tts:
              - 'services/tts/**'
            tts-piper:
              - 'services/tts-piper/**'

      - id: set-matrix
        run: |
          SERVICES=()
          for svc in api coturn frontend gateway mediasoup signaling-hybrid stt stt-sherpa translation translation-vinai tts tts-piper; do
            key=$(echo "$svc" | tr '-' '_')
            # dorny/paths-filter outputs use the original filter name
            val="${{ steps.filter.outputs.changes }}"
            done

          # Build matrix from filter changes output
          CHANGED='${{ steps.filter.outputs.changes }}'
          if [ "$CHANGED" == "[]" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            MATRIX=$(echo "$CHANGED" | jq -c '{service: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jbcalling-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/jbcalling-${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
