name: CI – Helm Chart

on:
  pull_request:
    paths: ["infrastructure/helm/**"]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Helm lint
        run: helm lint infrastructure/helm/jbcalling

      - name: Helm template render
        run: |
          helm template jbcalling infrastructure/helm/jbcalling \
            -f infrastructure/helm/jbcalling/values-prod.yaml \
            > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml
